# docs/schema/git_dag_schema.yaml
nodes:
  - Commit:
      description: "A Git commit in the repository's history."
      properties:
        sha: 
          type: string
          description: "Full SHA-1 hash of the commit."
        parents: 
          type: list[string]
          description: "List of parent commit SHAs."
        branch: 
          type: string
          description: "The branch name at the time of the commit."
        author: 
          type: string
          description: "Author of the commit."
        date: 
          type: string
          description: "ISO-8601 timestamp of the commit."
  - DefNode:
      description: "A structural code entity (function, class, method, etc.)."
      properties:
        id: 
          type: string
          description: "Unique structural identifier (e.g., FQN + content hash)."
        kind: 
          type: string
          description: "Entity type (function, class, method, file, module)."
        fqn: 
          type: string
          description: "Fully Qualified Name."
        file: 
          type: string
          description: "Path to the file containing this definition."
        introduced_in: 
          type: string
          description: "The Git commit SHA where this node was first discovered."
        modified_in: 
          type: list[string]
          description: "Array of commit SHAs tracking internal content mutations."
        deleted_in: 
          type: string
          description: "The commit SHA where the node was removed (null if active)."
        extractor_version:
          type: string
          description: "Version of the extractor that produced this fact."
  - FileNode:
      description: "A file in the repository."
      properties:
        path: 
          type: string
          description: "File path relative to repo root."
        introduced_in: 
          type: string
          description: "Commit SHA where the file was added."
        deleted_in: 
          type: string
          description: "Commit SHA where the file was deleted (null if active)."
  - RemoteReference:
      description: "A reference to a code entity in an external repository."
      properties:
        id:
          type: string
        repo_url:
          type: string
        ref_sha:
          type: string
        exposed_interface:
          type: string

edges:
  - CALLS:
      from: DefNode
      to: DefNode
      description: "A call relationship between two code entities."
      properties:
        confidence:
          type: float
          description: "Certainty score (0.0-1.0) of the call resolution."
        introduced_in: 
          type: string
          description: "Commit SHA where the call was first detected."
        deleted_in: 
          type: string
          description: "Commit SHA where the call was removed."
        extractor_version:
          type: string
          description: "Version of the extractor that produced this fact."
  - CONTAINS:
      from: FileNode
      to: DefNode
      description: "Structural containment of definitions within a file."
      properties:
        introduced_in: 
          type: string
          description: "Commit SHA where the definition was added to the file."
        deleted_in: 
          type: string
          description: "Commit SHA where the definition was removed from the file."
  - PARENT_OF:
      from: Commit
      to: Commit
      description: "Git commit ancestry relationship."
  - IMPORTS_FROM:
      from: DefNode
      to: RemoteReference
      description: "Cross-repository dependency link."
      properties:
        target_repo:
          type: string
          description: "URL of the target repository."
        target_sha:
          type: string
          description: "Commit SHA of the target repository at resolution time."
        resolved_at:
          type: string
          description: "ISO-8601 timestamp of when the link was resolved."

  - GROUNDED_IN:
      from: LLMArtifact
      to: DefNode
      description: "Provenance link between a generated artifact and its source code facts."

nodes_ext:
  - LLMArtifact:
      description: "An AI-generated artifact (requirement, summary, etc.)."
      properties:
        id:
          type: string
        artifact_type:
          type: string
        value:
          type: string
        grounded_in:
          type: list[string]
          description: "List of Fact IDs used as context."
        is_verified:
          type: boolean
        confidence:
          type: float
